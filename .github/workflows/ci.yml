name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: askharder
          POSTGRES_PASSWORD: askharder
          POSTGRES_DB: askharder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U askharder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://askharder:askharder@localhost:5432/askharder
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check src tests evals
      - run: uv run ruff format --check src tests evals
      - run: uv run pytest tests -q
      # mock judge — no API keys, proves the eval harness itself
      - run: uv run pytest evals -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # tsc -b && vite build — the type check is the real gate here
      - run: npm run build
